name: CareersPal - Greenhouse daily pipeline

on:
  schedule:
    # Daily at 06:00 UTC (adjust if you want; Vercel free cron alternative)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run Greenhouse pipeline (cron-safe)
        env:
          PIPELINE_URL: ${{ secrets.CAREERSPAL_PIPELINE_URL }}
          CRON_SECRET: ${{ secrets.CAREERSPAL_CRON_SECRET }}
        run: |
          if [ -z "$PIPELINE_URL" ]; then
            echo "Missing secret CAREERSPAL_PIPELINE_URL (e.g. https://www.careerspal.com/api/admin/sourcing/pipeline/greenhouse)"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing secret CAREERSPAL_CRON_SECRET (must match Vercel env SOURCING_CRON_SECRET)"
            exit 1
          fi
          # This endpoint can take a couple minutes depending on number of sources/jobs.
          # -L: follow redirects, --retry: tolerate transient network issues
          echo "Calling pipeline endpoint..."
          curl -sS -L \
            --connect-timeout 15 \
            --max-time 600 \
            --retry 2 \
            --retry-delay 2 \
            --retry-all-errors \
            --fail \
            -w "\nHTTP_STATUS=%{http_code}\n" \
            -G "$PIPELINE_URL" --data-urlencode "secret=$CRON_SECRET"

