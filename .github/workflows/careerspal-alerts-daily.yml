name: CareersPal - Daily alerts

on:
  schedule:
    # Daily at 08:00 UTC (matches previous Vercel cron)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Run daily alerts (cron-safe)
        env:
          ALERTS_URL: ${{ secrets.CAREERSPAL_ALERTS_URL }}
          ALERTS_SECRET: ${{ secrets.CAREERSPAL_ALERTS_CRON_SECRET }}
        run: |
          if [ -z "$ALERTS_URL" ]; then
            echo "Missing secret CAREERSPAL_ALERTS_URL (e.g. https://www.careerspal.com/api/alerts/daily)"
            exit 1
          fi
          if [ -z "$ALERTS_SECRET" ]; then
            echo "Missing secret CAREERSPAL_ALERTS_CRON_SECRET (must match Vercel env ALERTS_CRON_SECRET)"
            exit 1
          fi
          curl -sS -m 60 -G "$ALERTS_URL" --data-urlencode "secret=$ALERTS_SECRET"

